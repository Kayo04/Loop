<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verifica o teu email - Loop</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 40px 20px;
    }
    .container {
      max-width: 480px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #e5e7eb;
    }
    .header {
      background: #1e1e2e;
      padding: 28px;
      text-align: center;
    }
    .header h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -1px;
    }
    .content {
      padding: 32px 36px;
    }
    .content p {
      color: #4b5563;
      font-size: 15px;
      margin: 0 0 20px 0;
    }
    .code-box {
      background: #f9fafb;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      padding: 24px;
      text-align: center;
      margin: 24px 0;
    }
    .code-label {
      font-size: 11px;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .code-value {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: 10px;
      color: #111827;
      font-family: monospace;
    }
    .note {
      font-size: 13px;
      color: #9ca3af;
      margin-top: 24px;
    }
    .footer {
      text-align: center;
      padding: 16px;
      border-top: 1px solid #f3f4f6;
    }
    .footer p {
      color: #d1d5db;
      font-size: 11px;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Loop</h1>
    </div>
    <div class="content">
      <p>Olá,</p>
      <p>O teu código de verificação para activar a conta no Loop é:</p>

      <div class="code-box">
        <div class="code-label">Código de verificação</div>
        <div class="code-value">{{ .Token }}</div>
      </div>

      <p>Insere este código na página de verificação para activar a tua conta.</p>
      <p class="note">Este código expira em 1 hora. Se não criaste esta conta, ignora este email.</p>
    </div>
    <div class="footer">
      <p>© 2026 Loop Finance Tracker</p>
    </div>
  </div>
</body>
</html>
