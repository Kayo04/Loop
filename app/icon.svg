<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1040"/>
    </linearGradient>
    <linearGradient id="letter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#a5b4fc"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="8" ry="8" fill="url(#bg)"/>
  <!-- Geometric L - thick vertical bar + horizontal bar -->
  <rect x="9" y="6" width="5" height="20" rx="1.5" fill="url(#letter)"/>
  <rect x="9" y="21" width="14" height="5" rx="1.5" fill="url(#letter)"/>
</svg>
